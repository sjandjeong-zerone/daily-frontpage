<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>글로벌 신문 프런트 페이지</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f3ee;
    --surface: #ffffff;
    --surface2: #f9f8f5;
    --border: #e0ddd5;
    --border-strong: #c8c4b8;
    --text: #1a1916;
    --text2: #4a4844;
    --text3: #87847d;
    --accent: #b8860b;
  }

  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .site-header {
    background: var(--text); color: #fff; padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between; height: 52px;
  }
  .site-logo { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
  .site-date { font-size: 12px; opacity: 0.6; }

  .ticker-wrap { background: #1e1d1a; overflow: hidden; height: 36px; display: flex; align-items: center; }
  .ticker-inner { display: flex; gap: 2.5rem; animation: ticker-scroll 40s linear infinite; white-space: nowrap; padding-left: 100%; }
  .ticker-wrap:hover .ticker-inner { animation-play-state: paused; }
  @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .tick { font-size: 12px; color: #ccc; }
  .tick .val { margin-left: 5px; font-weight: 600; }
  .up { color: #4ade80; } .dn { color: #f87171; } .neu { color: #facc15; }

  .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }

  .cross-banner {
    background: linear-gradient(135deg, #1a1916 0%, #2d2b25 100%); color: #fff;
    border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.75rem;
    display: flex; gap: 2rem; flex-wrap: wrap; align-items: center;
  }
  .cross-item { font-size: 12px; }
  .cross-item strong { font-size: 13px; display: block; margin-bottom: 2px; color: #facc15; }

  .section-tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border-strong); margin-bottom: 1.5rem; overflow-x: auto; }
  .s-tab {
    padding: 0.6rem 1.5rem; font-size: 14px; font-weight: 600; border: none; background: transparent;
    color: var(--text3); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s; white-space: nowrap;
  }
  .s-tab:hover { color: var(--text); }
  .s-tab.active { color: var(--text); border-bottom-color: var(--text); }
  .s-tab.morning-tab { color: #b8860b; }
  .s-tab.morning-tab.active { border-bottom-color: #b8860b; color: #8b6914; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .paper-section { margin-bottom: 2.5rem; }
  .paper-header { display: flex; align-items: baseline; gap: 10px; border-bottom: 1.5px solid var(--border-strong); padding-bottom: 0.4rem; margin-bottom: 1rem; }
  .paper-name { font-size: 17px; font-weight: 700; color: var(--text); }
  .paper-url { font-size: 11px; color: var(--text3); }

  .pages-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  @media (max-width: 900px) { .pages-grid { grid-template-columns: 1fr; } }

  .page-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.15s, transform 0.15s; }
  .page-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.10); transform: translateY(-2px); }
  .card-top { padding: 0.5rem 0.9rem; display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .page-label { font-size: 11.5px; font-weight: 600; color: var(--text2); }

  .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .b-blue { background: #dbeafe; color: #1e40af; }
  .b-green { background: #dcfce7; color: #166534; }
  .b-purple { background: #ede9fe; color: #5b21b6; }
  .b-orange { background: #ffedd5; color: #9a3412; }
  .b-teal { background: #ccfbf1; color: #065f46; }
  .b-pink { background: #fce7f3; color: #9d174d; }
  .b-red { background: #fee2e2; color: #991b1b; }
  .b-amber { background: #fef9c3; color: #854d0e; }
  .b-gray { background: #f1f5f9; color: #334155; }

  .card-body { padding: 0.7rem 0.9rem 0.9rem; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .article-item { border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .article-item:last-child { border-bottom: none; padding-bottom: 0; }
  .art-headline { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.5; }
  .art-eng { font-size: 10px; color: var(--text3); font-style: italic; line-height: 1.3; margin-top: 1px; }
  .art-body { font-size: 11.5px; color: var(--text2); line-height: 1.6; margin-top: 2px; }

  /* Morning Briefing */
  .mb-wrap { max-width: 900px; margin: 0 auto; }
  .mb-headline {
    background: linear-gradient(135deg, #1a1916 0%, #2d2b25 100%);
    color: #fff; border-radius: 14px; padding: 1.5rem 2rem; margin-bottom: 1.5rem;
    font-size: 18px; font-weight: 700; line-height: 1.6; text-align: center;
    border-left: 5px solid #b8860b;
  }
  .mb-date { font-size: 12px; color: #b8860b; display: block; margin-bottom: 6px; font-weight: 400; }
  .mb-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; margin-bottom: 1.25rem;
  }
  .mb-section-header {
    padding: 0.7rem 1.2rem; font-size: 14px; font-weight: 700;
    border-bottom: 1px solid var(--border);
  }
  .mb-section-body {
    padding: 0.9rem 1.2rem; font-size: 12.5px; color: var(--text2);
    line-height: 1.8;
  }
  .mb-section-body table { width: 100%; border-collapse: collapse; margin: 6px 0; font-size: 12px; }
  .mb-section-body td, .mb-section-body th {
    padding: 4px 8px; border: 1px solid var(--border); text-align: left;
  }
  .mb-section-body th { background: var(--surface2); font-weight: 600; }
  .mb-section-body strong { color: var(--text); }
  .mb-news-item {
    padding: 8px 0; border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-start;
  }
  .mb-news-item:last-child { border-bottom: none; }
  .mb-news-cat {
    font-size: 10px; font-weight: 600; padding: 1px 8px;
    border-radius: 10px; white-space: nowrap; flex-shrink: 0; margin-top: 1px;
  }
  .cat-bear { background: #fee2e2; color: #991b1b; }
  .cat-bull { background: #dcfce7; color: #166534; }
  .cat-neutral { background: #f1f5f9; color: #334155; }
  .mb-news-title { font-size: 12.5px; font-weight: 600; color: var(--text); }
  .mb-news-summary { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .mb-insight {
    background: #fefce8; border: 1px solid #e6d88a;
    border-radius: 14px; padding: 1.2rem 1.5rem; margin-bottom: 1.25rem;
  }
  .mb-insight h4 { font-size: 14px; color: #854d0e; margin-bottom: 6px; }
  .mb-insight-body { font-size: 12.5px; line-height: 1.8; color: #3d3a22; }

  .loading, .error-box { text-align: center; padding: 4rem 1rem; color: var(--text3); font-size: 14px; }
  .error-box { color: #991b1b; }
  footer { text-align: center; font-size: 11px; color: var(--text3); padding: 1.5rem; border-top: 1px solid var(--border); margin-top: 1rem; }
</style>
</head>
<body>

<header class="site-header">
  <span class="site-logo">📰 글로벌 신문 프런트 페이지</span>
  <span class="site-date" id="siteDate">불러오는 중…</span>
</header>

<div class="ticker-wrap"><div class="ticker-inner" id="ticker"></div></div>

<div class="container">
  <div class="cross-banner" id="crossBanner"></div>
  <div class="section-tabs" id="sectionTabs"></div>
  <div id="content"><div class="loading">📡 오늘 자 신문 데이터를 불러오는 중…</div></div>
</div>

<footer id="footer"></footer>

<script>
const BADGE_MAP = {
  blue: 'b-blue', green: 'b-green', purple: 'b-purple', orange: 'b-orange',
  teal: 'b-teal', pink: 'b-pink', red: 'b-red', amber: 'b-amber', gray: 'b-gray'
};

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderTicker(items) {
  const one = items.map(t =>
    `<span class="tick">${esc(t.name)} <span class="val ${esc(t.dir)}">${esc(t.value)} ${esc(t.change)}</span></span>`
  ).join('');
  document.getElementById('ticker').innerHTML = one + one;
}

function renderBanner(keywords) {
  const head = `<div class="cross-item"><strong>🔥 오늘의 공통 키워드</strong></div>`;
  const items = keywords.map(k =>
    `<div class="cross-item"><strong>${esc(k.label)}</strong>${esc(k.desc)}</div>`
  ).join('');
  document.getElementById('crossBanner').innerHTML = head + items;
}

function renderArticle(a) {
  const eng = a.eng ? `<div class="art-eng">${esc(a.eng)}</div>` : '';
  return `
    <div class="article-item">
      <div class="art-headline">${esc(a.headline)}</div>
      ${eng}
      <div class="art-body">${esc(a.body)}</div>
    </div>`;
}

function renderCard(p) {
  const badgeClass = BADGE_MAP[p.badgeColor] || 'b-gray';
  const articles = (p.articles || []).map(renderArticle).join('');
  return `
    <div class="page-card">
      <div class="card-top">
        <span class="page-label">${esc(p.page)}</span>
        <span class="badge ${badgeClass}">${esc(p.badge)}</span>
      </div>
      <div class="card-body">${articles}</div>
    </div>`;
}

function renderPaper(paper) {
  const cards = paper.pages.map(renderCard).join('');
  return `
    <div class="paper-section">
      <div class="paper-header">
        <span class="paper-name">${esc(paper.name)}</span>
        <span class="paper-url">${esc(paper.url)}</span>
      </div>
      <div class="pages-grid">${cards}</div>
    </div>`;
}

function renderSection(sectionData) {
  return sectionData.papers.map(renderPaper).join('');
}

function renderMorning(m) {
  if (!m) return '';

  const newsHtml = (m.top_news || []).map(n => {
    let catClass = 'cat-neutral';
    if (n.category && (n.category.includes('악재') || n.category.includes('bear'))) catClass = 'cat-bear';
    else if (n.category && (n.category.includes('호재') || n.category.includes('bull'))) catClass = 'cat-bull';
    return `
      <div class="mb-news-item">
        <span class="mb-news-cat ${catClass}">${esc(n.category || '뉴스')}</span>
        <div>
          <div class="mb-news-title">${esc(n.title)}</div>
          <div class="mb-news-summary">${esc(n.summary || '')}</div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="mb-wrap">
      <div class="mb-headline">
        <span class="mb-date">📆 ${esc(m.date || '')}</span>
        ${esc(m.headline || '')}
      </div>

      <div class="mb-section">
        <div class="mb-section-header" style="border-left: 4px solid #1e40af;">📊 국내 증시</div>
        <div class="mb-section-body">${m.domestic_market || ''}</div>
      </div>

      <div class="mb-section">
        <div class="mb-section-header" style="border-left: 4px solid #5b21b6;">🌍 해외 증시</div>
        <div class="mb-section-body">${m.overseas_market || ''}</div>
      </div>

      <div class="mb-section">
        <div class="mb-section-header" style="border-left: 4px solid #065f46;">🌏 주요 아시아 증시</div>
        <div class="mb-section-body">${m.asia_market || ''}</div>
      </div>

      <div class="mb-section">
        <div class="mb-section-header" style="border-left: 4px solid #9a3412;">📌 주요 뉴스</div>
        <div class="mb-section-body">${newsHtml}</div>
      </div>

      <div class="mb-insight">
        <h4>💡 ${esc(m.insight_title || '제론의 인사이트')}</h4>
        <div class="mb-insight-body">${m.insight_content || ''}</div>
      </div>
    </div>`;
}

function buildPage(data) {
  document.getElementById('siteDate').textContent =
    `${data.dateLabel} — 국내·미국 주요 경제·일간지 1~3면`;

  renderTicker(data.ticker || []);
  renderBanner(data.keywords || []);

  // Build tab order: 모닝브리핑 first (if exists), then sections
  const tabsEl = document.getElementById('sectionTabs');
  const contentEl = document.getElementById('content');
  const hasMorning = !!(data.morning && data.morning.headline);
  const sectionKeys = Object.keys(data.sections || {});

  let tabIndex = 0;
  let tabsHtml = '';
  let panelsHtml = '';

  if (hasMorning) {
    tabsHtml += `<button class="s-tab morning-tab active" data-key="__morning__">☀️ 모닝브리핑</button>`;
    panelsHtml += `<div class="tab-panel active" id="panel-__morning__">${renderMorning(data.morning)}</div>`;
    tabIndex++;
  }

  sectionKeys.forEach(key => {
    const isActive = !hasMorning && tabIndex === 0;
    tabsHtml += `<button class="s-tab ${isActive ? 'active' : ''}" data-key="${key}">${esc(data.sections[key].label)}</button>`;
    panelsHtml += `<div class="tab-panel ${isActive ? 'active' : ''}" id="panel-${key}">${renderSection(data.sections[key])}</div>`;
    tabIndex++;
  });

  tabsEl.innerHTML = tabsHtml;
  contentEl.innerHTML = panelsHtml;

  // Tab switching
  tabsEl.querySelectorAll('.s-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      tabsEl.querySelectorAll('.s-tab').forEach(b => b.classList.remove('active'));
      contentEl.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.key).classList.add('active');
    });
  });

  document.getElementById('footer').textContent =
    `자동 생성: ${data.generatedAt || data.date} · 데이터 출처: 각 언론사 공개 기사 · 자동 갱신 시스템`;
}

fetch('data.json?t=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('data.json 로드 실패 (' + r.status + ')'); return r.json(); })
  .then(buildPage)
  .catch(err => {
    document.getElementById('content').innerHTML =
      `<div class="error-box">⚠️ 데이터를 불러오지 못했습니다.<br>${esc(err.message)}<br><br>update.js가 정상 실행되어 data.json이 생성됐는지 확인하세요.</div>`;
  });
</script>
</body>
</html>
